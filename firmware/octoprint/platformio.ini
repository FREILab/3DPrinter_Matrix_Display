[platformio]
; Default build environment
; default_envs = octo_drucker_1, octo_drucker_2, octo_drucker_3
default_envs = octo_drucker_3

[env]
; Common base configuration for all printers
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
monitor_speed = 115200

; Lock libraries to stable versions
lib_deps =
    adafruit/Adafruit Protomatter @ ^1.7.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson @ ^7.0.0
    ; Lock to stable Git tag v1.1.6
    https://github.com/chunkysteveo/OctoPrintAPI.git#1.1.6

build_flags = 
    -I include
    ; CI fallbacks using sysenv variables if secret.h is missing locally
    -D WIFI_SSID_ENV=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PASS_ENV=\"${sysenv.WIFI_PASS}\"
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

[env:octo_drucker_1]
build_flags = 
    ${env.build_flags} 
    -D OCTO_PRINTER_1 
    -D PRINTER_IP=\"10.30.0.138\" 
    -D PRINTER_API_KEY=\"${sysenv.OCTO_API_KEY_D1}\"

[env:octo_drucker_2]
build_flags = 
    ${env.build_flags} 
    -D OCTO_PRINTER_2 
    -D PRINTER_IP=\"10.30.0.7\" 
    -D PRINTER_API_KEY=\"${sysenv.OCTO_API_KEY_D2}\"

[env:octo_drucker_3]
build_flags = 
    ${env.build_flags} 
    -D OCTO_PRINTER_3 
    -D PRINTER_IP=\"10.30.0.8\" 
    -D PRINTER_API_KEY=\"${sysenv.OCTO_API_KEY_D3}\"