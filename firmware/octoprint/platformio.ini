[platformio]
# Standardordner für dieses Projekt
default_envs = octo_drucker_1, octo_drucker_2, octo_drucker_3

[env]
# Gemeinsame Basis-Konfiguration für alle Drucker
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

# Fixierung der Bibliotheken auf stabile Versionen
lib_deps =
    adafruit/Adafruit Protomatter @ ^1.7.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    bblanchon/ArduinoJson @ ^7.0.0
    # Fixierung auf den stabilen Git-Tag v1.1.6
    https://github.com/chunkysteveo/OctoPrintAPI.git#1.1.6

build_flags = 
    -I include
    # Falls lokal keine secret.h da ist, nutzt das CI diese sysenv-Variablen
    -D WIFI_SSID_ENV=\"${sysenv.WIFI_SSID}\"
    -D WIFI_PASS_ENV=\"${sysenv.WIFI_PASS}\"

[env:octo_drucker_1]
build_flags = 
    ${env.build_flags} 
    -D OCTO_PRINTER_1 
    -D PRINTER_IP=\"10.30.0.138\" 
    -D PRINTER_API_KEY=\"${sysenv.OCTO_API_KEY_D1}\" # Eindeutiger Name

[env:octo_drucker_2]
build_flags = 
    ${env.build_flags} 
    -D OCTO_PRINTER_2 
    -D PRINTER_IP=\"10.30.0.140\" 
    -D PRINTER_API_KEY=\"${sysenv.OCTO_API_KEY_D2}\"

[env:octo_drucker_3]
build_flags = 
    ${env.build_flags} 
    -D OCTO_PRINTER_3 
    -D PRINTER_IP=\"10.30.0.142\" 
    -D PRINTER_API_KEY=\"${sysenv.OCTO_API_KEY_D3}\"